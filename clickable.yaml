clickable_minimum_required: 8.8.0
framework: ubuntu-touch-24.04-1.x
builder: cmake
kill: pefl
skip_review: true
libraries:
    efl:
        dependencies_host:
            - ninja-build
            - meson
            - build-essential
            - check
            - libc-bin
            - libedje-bin
            - libelementary-bin
            - libeet-bin
            - libeolian-bin
        dependencies_target:
            - libinput-dev 
            - libssl-dev 
            - libsystemd-dev 
            - libjpeg-dev 
            - libglib2.0-dev 
            - libgstreamer1.0-dev 
            - libfreetype-dev 
            - libfontconfig-dev 
            - libfribidi-dev 
            - libavahi-client-dev 
            - libharfbuzz-dev 
            - libibus-1.0-dev 
            - libx11-dev 
            - libxext-dev 
            - libxrender-dev 
            - libgl1-mesa-dev 
            - libopenjp2-7-dev 
            - libwebp-dev 
            - libgif-dev 
            - libtiff5-dev 
            - libpoppler-dev 
            - libpoppler-cpp-dev 
            - libspectre-dev 
            - libraw-dev 
            - librsvg2-dev 
            - libudev-dev 
            - libmount-dev 
            - libdbus-1-dev 
            - libpulse-dev 
            - libsndfile1-dev 
            - libxcursor-dev 
            - libxcomposite-dev 
            - libxinerama-dev 
            - libxrandr-dev 
            - libxtst-dev 
            - libxss-dev 
            - libgstreamer-plugins-base1.0-dev  
            - libscim-dev 
            - libxdamage-dev
            - libwebp-dev 
            - libunwind-dev 
            - libheif-dev
            - liblua5.1.0-dev
            - liblua5.1.0
        builder: custom
        build:
            - tar xvf efl-1.28.1.tar.xz
            - meson --cross-file "${SRC_DIR}/dist/lomiri-${ARCH_TRIPLET}.ini" --prefix=/ -Dbuild-tests=false -Dbindings="" -Dsdl=false build "${BUILD_DIR}/efl-1.28.1"
            - ninja -C build
            - env DESTDIR="${INSTALL_DIR}" ninja -C build install
            #- wget https://download.enlightenment.org/rel/libs/efl/efl-1.28.1.tar.xz
dependencies_target:
    - liblua5.1.0-dev
    - liblua5.1.0    
